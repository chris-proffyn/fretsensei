<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ModeWise</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ModeWise — interactive guitar fretboard visualiser" />
    <link rel="icon" href="/favicon.ico" sizes="any" media="(prefers-color-scheme: light)" />
    <link rel="icon" href="/favicon-lite.ico" sizes="any" media="(prefers-color-scheme: dark)" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-32.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-32-lite.png"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon-lite.png"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/icon-192.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/icon-192-lite.png"
      media="(prefers-color-scheme: dark)"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
